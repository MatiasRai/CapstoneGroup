<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Registrar Ruta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="form" (ngSubmit)="registrarRuta()" class="ion-padding">
    <ion-item>
      <ion-label position="floating">Nombre de la ruta</ion-label>
      <ion-input type="text" formControlName="nombre_ruta"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Descripción</ion-label>
      <ion-textarea formControlName="descripcion_ruta"></ion-textarea>
    </ion-item>

    <ion-button expand="full" type="submit" class="ion-margin-top">Registrar Ruta</ion-button>
  </form>

  <div id="map" style="height: 300px; width: 100%; margin: 16px 0; border-radius: 10px; overflow: hidden;"></div>
</ion-content>
